name: Gateway CI

on:
  pull_request:
    paths:
      - 'packages/gateway/**'
  push:
    branches: [develop, main]
    paths:
      - 'packages/gateway/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/gateway

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test
