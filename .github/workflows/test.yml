name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gateway-unit-tests:
    name: Gateway Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd packages/gateway && npm ci

      - name: Type check
        run: cd packages/gateway && yarn typecheck

      - name: Run unit tests
        run: cd packages/gateway && yarn test

  python-sdk-tests:
    name: Python SDK Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.10', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          cd packages/sdk
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          cd packages/sdk
          python -m pytest tests/test_gateway_client.py tests/test_gateway_integration.py tests/test_basic_sdk.py -v
